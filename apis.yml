apis:
  - aid: takealot:seller-api
    name: Takealot Seller API
    description: >-
      The Takealot Seller API is the public REST API that Takealot Marketplace
      sellers use to manage their offers, monitor stock health, and pull sales
      and order data on Takealot.com. It exposes offer CRUD by SKU / barcode /
      offer-id (single and batch of up to 10,000 items), batch-status polling,
      stock-count and stock-health-stats diagnostics tied to Takealot's
      storage-fee policy, and sales / sales-summary / sales-orders /
      customer-invoices reporting. Authentication is by per-seller API key
      (Authorization header) minted from the Seller Portal at
      https://seller.takealot.com/api/seller-api; the API is described as a
      Swagger 2.0 specification at https://seller-api.takealot.com/api-docs/
      with the canonical document at
      https://seller-api.takealot.com/api-docs/swagger.json. Responses are
      returned as application/json, text/csv, application/pdf, or text/html
      depending on the operation, and every response carries the standard
      x-RateLimit-Limit / x-RateLimit-Remaining / x-RateLimit-Reset headers.
    humanURL: https://seller-api.takealot.com/api-docs/
    baseURL: https://seller-api.takealot.com
