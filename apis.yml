aid: takealot
name: Takealot
description: >-
  Takealot is South Africa's largest online retailer and the flagship brand of
  the Takealot Group, a Cape Town-headquartered e-commerce holding company that
  is majority-owned (approximately 96%) by Naspers through its consumer-internet
  arm Prosus. The Group operates a connected ecosystem of consumer brands —
  Takealot.com (general merchandise marketplace), Mr D (on-demand food and
  grocery delivery), Superbalist.com (fashion and homeware, divested in
  September 2024 to a South African consortium led by Blank Canvas Capital but
  historically associated with the Group), and TFS (Takealot Fulfilment
  Services, the Group's first- and last-mile logistics arm) — and employs more
  than 7,300 people across South Africa. Takealot.com itself is a 1P-plus-3P
  hybrid marketplace where Takealot Retail sells its own inventory alongside
  thousands of third-party Marketplace sellers; sellers list, price, fulfil,
  and analyse their offers through the Seller Portal at seller.takealot.com
  and programmatically via the public Takealot Seller API. The Seller API is
  the company's primary external developer surface — a Swagger 2.0 / OpenAPI
  REST API at seller-api.takealot.com that exposes offer management (single
  and 10,000-item batch create / update / patch), stock-health and storage-fee
  diagnostics, and sales / order / customer-invoice reporting, authenticated
  with per-seller API keys minted from the Seller Portal and governed by
  per-key rate-limit headers (x-RateLimit-Limit / Remaining / Reset). There is
  no public buyer-side / catalog / consumer-facing API, no published OAuth
  flow, no webhook surface, no SDKs, no CLI, and no developer Slack / forum;
  the Group's GitHub presence (TAKEALOT org) is a small set of archived
  infrastructure forks (Diamond, statsite, kafka-connect-bigquery,
  protoc-gen-bq-schema, Newtonsoft.Json, Lithium) rather than a maintained
  developer platform. The Seller API is the integration point that powers
  South Africa's marketplace-listing tool ecosystem (Stock2Shop, Wherehouse,
  Flowgear, OrderEazi, and similar) and is the canonical artifact to profile
  for any Takealot capability work.
